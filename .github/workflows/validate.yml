name: Validate Agents Store

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate manifest and agent folders
        run: npm run manifest:check

      - name: Verify deterministic catalog build
        run: npm run verify:repro
